<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KORVIL — Workforce Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#050911;color:#E2E8F0;font-family:'Syne',sans-serif;min-height:100vh}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0d1421}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:4px}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes floatUp{0%{opacity:.5;transform:translateY(0)}100%{opacity:0;transform:translateY(-80vh)}}
.fu{animation:fadeUp .32s ease both}
.spin{display:inline-block;animation:spin 1s linear infinite}
.pulse{animation:pulse 1.5s ease-in-out infinite}

/* ── LAYOUT ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#050911 0%,#0a1628 50%,#050911 100%);
  position:relative;overflow:hidden}
#login-screen .dot-bg{position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.05) 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;border-radius:50%;background:#00d4ff;
  opacity:.5;bottom:0;animation:floatUp 7s ease-in-out infinite}

#app-layout{display:flex;min-height:100vh}
#sidebar{width:220px;background:#08101f;border-right:1px solid #0f2040;
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;
  overflow-y:auto;z-index:100}
#main{margin-left:220px;flex:1;padding:32px 36px;min-height:100vh;overflow-y:auto}

/* ── SIDEBAR ── */
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid #0f2040;
  display:flex;align-items:center;gap:10px}
.sb-brand{font-size:15px;font-weight:800;letter-spacing:2.5px;color:#E2E8F0}
.sb-user{padding:13px 14px;border-bottom:1px solid #0f2040;
  display:flex;align-items:center;gap:10px}
.sb-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.sb-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-role{font-size:10px;color:#4A90D9;font-family:'DM Mono',monospace;letter-spacing:.5px}
#nav{flex:1;padding:8px 8px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:10px 12px;
  border-radius:8px;border:none;cursor:pointer;margin-bottom:3px;
  background:transparent;color:#64748B;font-size:13px;font-weight:500;
  text-align:left;position:relative;transition:all .15s;font-family:inherit}
.nav-btn:hover{background:#0f2040;color:#94A3B8}
.nav-btn.active{background:#00d4ff12;color:#00d4ff;font-weight:700}
.nav-btn.active::before{content:'';position:absolute;left:0;top:15%;bottom:15%;
  width:3px;border-radius:99px;background:#00d4ff}
.nav-icon{font-size:15px;width:18px;text-align:center}
.nav-badge{background:#00d4ff;color:#050911;font-size:9px;font-weight:800;
  border-radius:99px;padding:2px 6px;margin-left:auto;font-family:'DM Mono',monospace}
.sb-logout{margin:auto 8px 14px;padding:9px 12px;border:1px solid #1e3a5f;border-radius:8px;
  background:transparent;color:#64748B;cursor:pointer;font-size:12px;
  display:flex;align-items:center;gap:8px;font-family:inherit;transition:all .2s}
.sb-logout:hover{color:#f87171;border-color:#f87171}

/* ── LOGIN CARD ── */
.login-card{background:#0d1421;border:1px solid #1e3a5f;border-radius:18px;
  padding:38px 34px;width:100%;max-width:400px;z-index:1;position:relative}
.brand-name{font-size:20px;font-weight:800;letter-spacing:3px;color:#E2E8F0}
.brand-sub{font-size:10px;color:#4A90D9;letter-spacing:1px;font-family:'DM Mono',monospace}
.tab-wrap{display:flex;background:#070d1a;border-radius:9px;padding:3px;
  margin-bottom:22px;border:1px solid #1e3a5f}
.tab-btn{flex:1;padding:9px 0;border-radius:7px;border:none;cursor:pointer;
  font-size:13px;font-weight:600;transition:all .18s;background:transparent;
  color:#64748B;font-family:inherit}
.tab-btn.active{background:#00d4ff;color:#050911}

/* ── FORM ELEMENTS ── */
.field-wrap{margin-bottom:14px}
.field-label{display:block;font-size:10px;color:#4A90D9;letter-spacing:1px;
  margin-bottom:5px;font-family:'DM Mono',monospace}
.field-input{width:100%;background:#070d1a;border:1px solid #1e3a5f;border-radius:9px;
  padding:11px 14px;color:#E2E8F0;font-size:14px;outline:none;
  transition:border-color .2s;font-family:inherit}
.field-input:focus{border-color:#00d4ff}
.pass-wrap{position:relative}
.eye-btn{position:absolute;right:11px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:#4A90D9;
  display:flex;align-items:center;padding:0;font-size:15px}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#00d4ff,#0ea5e9);
  border:none;border-radius:9px;color:#050911;font-size:14px;font-weight:700;
  cursor:pointer;letter-spacing:.5px;font-family:inherit;transition:opacity .2s}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{background:#1e3a5f;color:#334155;cursor:not-allowed;opacity:1}
.btn-sm{padding:6px 14px;border-radius:7px;border:none;cursor:pointer;
  font-size:12px;font-weight:700;font-family:inherit}
.btn-cyan{background:#00d4ff12;border:1px solid #00d4ff44;color:#00d4ff;
  border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px;
  transition:all .2s}
.btn-cyan:hover{background:#00d4ff22}
.btn-cyan:disabled{opacity:.4;cursor:not-allowed}
.btn-save{padding:10px 24px;background:#00d4ff;border:none;border-radius:7px;
  color:#050911;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-ghost{padding:9px 16px;background:transparent;border:1px solid #1e3a5f;
  border-radius:7px;color:#64748B;cursor:pointer;font-size:12px;font-family:inherit}
.btn-danger{background:#1a0505;border:1px solid #7f1d1d;color:#FCA5A5;
  border-radius:6px;padding:5px 12px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit}
.btn-danger:hover{background:#7f1d1d}

/* ── ALERTS ── */
.alert{border-radius:8px;padding:9px 13px;font-size:12px;margin-bottom:12px}
.alert-err{background:#1a0a0a;border:1px solid #7f1d1d;color:#FCA5A5}
.alert-ok{background:#04290d;border:1px solid #166534;color:#4ADE80}

/* ── CARDS ── */
.card{background:#0d1421;border:1px solid #0f2040;border-radius:13px;overflow:hidden;margin-bottom:18px}
.card-body{padding:20px}
.card-header{padding:14px 20px;border-bottom:1px solid #0f2040;font-size:13px;font-weight:700}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:26px}
.stat-card{background:#0d1421;border:1px solid #0f2040;border-radius:13px;
  padding:20px 18px;position:relative;overflow:hidden}
.stat-top-bar{position:absolute;top:0;left:0;right:0;height:2px}
.stat-icon{font-size:18px;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:800;font-family:'DM Mono',monospace;line-height:1}
.stat-label{font-size:11px;color:#64748B;margin-top:5px}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:11px 18px;text-align:left;font-size:10px;color:#4A90D9;
  letter-spacing:1px;font-family:'DM Mono',monospace;border-bottom:1px solid #0f2040}
.tbl td{padding:11px 18px;border-bottom:1px solid #0a1628;font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.status-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;
  font-family:'DM Mono',monospace;display:inline-block}
.pill-present{background:#04290d;color:#4ADE80}
.pill-absent{background:#1a0505;color:#FCA5A5}
.pill-none{background:#0a1628;color:#334155}
.pill-new{background:#04290d;color:#4ADE80;font-size:9px}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:5px}
.cal-day{border-radius:7px;padding:6px 3px;text-align:center;border:1px solid}
.cal-dn{font-size:8px;color:#4A90D9;font-family:'DM Mono',monospace}
.cal-d{font-size:12px;font-weight:700}
.cal-s{font-size:8px}
.day-present{background:#04290d;border-color:#166534}
.day-absent{background:#1a0505;border-color:#7f1d1d}
.day-none{background:#070d1a;border-color:#0f2040}

/* ── ATTENDANCE ACTION ── */
.att-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:480px}
.att-btn{border-radius:13px;padding:28px 16px;cursor:pointer;text-align:center;border:2px solid;
  background:transparent;font-family:inherit;transition:transform .15s,opacity .15s}
.att-btn:hover{transform:scale(1.02)}
.att-btn-present{background:#04290d;border-color:#166534}
.att-btn-absent{background:#1a0505;border-color:#7f1d1d}
.att-btn-icon{font-size:32px;margin-bottom:10px}
.att-btn-label{font-size:14px;font-weight:700}
.att-btn-sub{font-size:11px;color:#64748B;margin-top:3px}
.att-status-box{border-radius:13px;padding:32px 24px;text-align:center;
  border:1px solid;max-width:480px}
.att-icon{font-size:48px;margin-bottom:14px}
.att-title{font-size:19px;font-weight:800;margin-bottom:6px}
.att-sub{color:#64748B;font-size:12px;font-family:'DM Mono',monospace}

/* ── FORM GRID ── */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;margin-bottom:14px}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}

/* ── MISC ── */
.page-title{font-size:22px;font-weight:800;letter-spacing:.3px;margin-bottom:4px}
.page-sub{font-size:12px;color:#4A90D9;font-family:'DM Mono',monospace;margin-bottom:24px}
.separator{height:1px;background:#0f2040;margin:20px 0}
.hidden{display:none!important}
.flex{display:flex}
.gap-8{gap:8px}
.gap-10{gap:10px}
.wrap{flex-wrap:wrap}
.mb-16{margin-bottom:16px}
.mb-20{margin-bottom:20px}
.center{text-align:center}
.mono{font-family:'DM Mono',monospace}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);
  z-index:999;display:flex;align-items:center;justify-content:center}
.modal-box{background:#0d1421;border:1px solid #7f1d1d;border-radius:14px;
  padding:28px 30px;max-width:340px;width:90%;text-align:center}

/* ── SYNC NOTICE ── */
#sync-bar{position:fixed;bottom:0;left:0;right:0;background:#0a1628;
  border-top:1px solid #1e3a5f;padding:8px 16px;font-size:11px;color:#4A90D9;
  font-family:'DM Mono',monospace;display:flex;align-items:center;gap:8px;z-index:200}
#sync-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;flex-shrink:0}
#sync-dot.syncing{background:#FBBF24;animation:pulse 1s infinite}
#sync-dot.err{background:#F87171}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  #sidebar{width:200px}
  #main{margin-left:200px;padding:20px 16px}
  .att-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  #sidebar{width:170px}
  #main{margin-left:170px;padding:16px 12px}
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="dot-bg"></div>
  <div id="particles-container"></div>
  <div class="login-card fu">
    <div class="flex gap-10 mb-20" style="align-items:center">
      <svg width="42" height="42" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#0A0F1E"/>
        <path d="M10 14 L20 26 L30 14" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="20" cy="20" r="3.5" fill="#00D4FF"/>
      </svg>
      <div>
        <div class="brand-name">KORVIL</div>
        <div class="brand-sub">WORKFORCE INTELLIGENCE</div>
      </div>
    </div>

    <div class="tab-wrap">
      <button class="tab-btn active" id="tab-admin" onclick="switchTab('admin')">Admin</button>
      <button class="tab-btn" id="tab-employee" onclick="switchTab('employee')">Employee</button>
    </div>

    <div class="field-wrap">
      <label class="field-label">USERNAME</label>
      <input class="field-input" id="l-user" placeholder="korvil_admin" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="field-wrap">
      <label class="field-label">PASSWORD</label>
      <div class="pass-wrap">
        <input class="field-input" id="l-pass" type="password" placeholder="password" style="padding-right:42px" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="eye-btn" onclick="toggleEye()" id="eye-btn"><svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A90D9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A90D9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
      </div>
    </div>

    <div id="l-err" class="alert alert-err hidden"></div>
    <div id="l-loading" class="center hidden" style="color:#4A90D9;font-size:12px;margin-bottom:10px;font-family:'DM Mono',monospace">Signing in...</div>
    <button class="btn-primary" id="l-submit" onclick="doLogin()">SIGN IN</button>
    <div class="center" style="margin-top:14px;font-size:11px;color:#334155" id="l-hint">Admin accounts have full system access</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     APP LAYOUT
═══════════════════════════════════════════════════════════ -->
<div id="app-layout" class="hidden">
  <aside id="sidebar">
    <div class="sb-logo">
      <svg width="26" height="26" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#0A0F1E"/>
        <path d="M10 14 L20 26 L30 14" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="20" cy="20" r="3.5" fill="#00D4FF"/>
      </svg>
      <span class="sb-brand">KORVIL</span>
    </div>
    <div class="sb-user">
      <div class="sb-avatar" id="sb-av" style="background:#00d4ff18;border:1px solid #00d4ff33;color:#00d4ff">A</div>
      <div style="min-width:0">
        <div class="sb-name" id="sb-name">Admin</div>
        <div class="sb-role" id="sb-role">ADMIN</div>
      </div>
    </div>
    <nav id="nav"></nav>
    <button class="sb-logout" onclick="doLogout()">⎋ Sign Out</button>
  </aside>
  <main id="main"></main>
</div>

<!-- SYNC BAR -->
<div id="sync-bar" class="hidden">
  <div id="sync-dot"></div>
  <span id="sync-msg">Connected</span>
</div>

<!-- DELETE MODAL -->
<div id="del-modal" class="modal-overlay hidden">
  <div class="modal-box fu">
    <div style="font-size:28px;margin-bottom:10px">⚠️</div>
    <div style="font-weight:700;margin-bottom:6px;font-size:15px">Remove Employee?</div>
    <div style="font-size:13px;color:#64748B;margin-bottom:22px">
      This will permanently delete <strong id="del-name" style="color:#E2E8F0"></strong> and all their records.
    </div>
    <div class="flex gap-10" style="justify-content:center">
      <button class="btn-ghost" onclick="closeDelModal()">Cancel</button>
      <button onclick="confirmDel()" style="padding:9px 20px;background:#7f1d1d;border:none;border-radius:7px;color:#FCA5A5;cursor:pointer;font-weight:700;font-family:inherit;font-size:13px">Remove</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG  — IMPORTANT: Set your JSONBin.io details below
// ═══════════════════════════════════════════════════════════
/*
  HOW TO SET UP FREE CLOUD SYNC (so all users share the same data):
  1. Go to https://jsonbin.io and sign up free
  2. Click "Create Bin" → paste this JSON:
     {"employees":[],"attendance":{},"messages":[],"officeLocation":null,"officeRadius":200}
  3. Copy the BIN ID from the URL (looks like: 6613abc...)
  4. Go to Account → API Keys → Copy your Master Key
  5. Paste them below replacing the placeholder values
*/
const BIN_ID   = "69e81ab8aaba88219723fe8d";
const API_KEY  = "$2a$10$b9Nl8njKfKjleFCMFhcGOOba6VqA31d92haaQkLH3iKktOq/mC/oO";
const BIN_URL  = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const USE_CLOUD = BIN_ID !== "YOUR_BIN_ID_HERE" && API_KEY !== "YOUR_API_KEY_HERE";

// Admin credentials (hardcoded — safe because only admin can log in)
const ADMINS = [
  { username: "korvil_admin", password: "korviladmin_pass", name: "Admin" }
];

const DEFAULT_RADIUS = 200;

// ═══════════════════════════════════════════════════════════
//  DATA LAYER  — Cloud + LocalStorage fallback
// ═══════════════════════════════════════════════════════════
let DB = { employees:[], attendance:{}, messages:[], officeLocation:null, officeRadius:DEFAULT_RADIUS };
let lastFetch = 0;
let FETCH_INTERVAL = 30000; // refresh every 30s

function emptyDB() {
  return { employees:[], attendance:{}, messages:[], officeLocation:null, officeRadius:DEFAULT_RADIUS };
}

async function fetchDB() {
  if (!USE_CLOUD) {
    // LocalStorage only — warn user this is single-device
    try { const s = localStorage.getItem("korvil_db"); if (s) DB = JSON.parse(s); } catch {}
    return;
  }
  setSyncState("syncing","Syncing...");
  try {
    const r = await fetch(BIN_URL+"/latest", {
      headers: {
        "X-Master-Key": API_KEY,
        "X-Access-Key": API_KEY,
        "X-Bin-Meta": "false"
      }
    });
    if (!r.ok) throw new Error("fetch failed "+r.status);
    DB = await r.json();
    if (!DB.employees) DB = emptyDB();
    lastFetch = Date.now();
    localStorage.setItem("korvil_db", JSON.stringify(DB)); // cache
    setSyncState("ok","Synced");
  } catch(e) {
    // Fall back to local cache
    try { const s = localStorage.getItem("korvil_db"); if (s) DB = JSON.parse(s); } catch {}
    setSyncState("err","Offline — using cached data");
  }
}

async function saveDB() {
  localStorage.setItem("korvil_db", JSON.stringify(DB)); // always save locally
  if (!USE_CLOUD) return;
  setSyncState("syncing","Saving...");
  try {
    const r = await fetch(BIN_URL, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": API_KEY,
        "X-Access-Key": API_KEY
      },
      body: JSON.stringify(DB)
    });
    if (!r.ok) throw new Error("save failed "+r.status);
    setSyncState("ok","Saved ✓");
    lastFetch = Date.now();
  } catch(e) {
    setSyncState("err","Save failed — check connection");
  }
}

function setSyncState(state, msg) {
  const dot = document.getElementById("sync-dot");
  const txt = document.getElementById("sync-msg");
  if (!dot) return;
  dot.className = state === "syncing" ? "syncing" : state === "err" ? "err" : "";
  txt.textContent = msg;
}

// Poll for updates every 30s when app is open
setInterval(async () => {
  if (!currentUser || !USE_CLOUD) return;
  if (Date.now() - lastFetch < FETCH_INTERVAL) return;
  await fetchDB();
  if (currentPage) renderPage(currentPage);
}, 15000);

// ═══════════════════════════════════════════════════════════
//  UTILITY
// ═══════════════════════════════════════════════════════════
function todayKey() { return new Date().toISOString().split("T")[0]; }

function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d);
  return dt.toLocaleDateString("en-IN", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
}

function daysInMonth(y, m) { return
